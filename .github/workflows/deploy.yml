- name: Install dependencies
  run: |
    cd frontend
    npm ci

- name: Build (production)
  env:
    REPO_NAME: ${{ github.event.repository.name }}
  run: |
    cd frontend
    npx ng build \
      --configuration production \
      --base-href="/${REPO_NAME}/"

- name: Prepare Pages artifact (SPA fallback + .nojekyll)
  run: |
    cp frontend/dist/xsl-fo-studio/browser/index.html frontend/dist/xsl-fo-studio/browser/404.html
    touch frontend/dist/xsl-fo-studio/browser/.nojekyll

- name: Upload artifact
  uses: actions/upload-pages-artifact@v3
  with:
    path: frontend/dist/xsl-fo-studio/browser